name: build-client

# Builds the Tauri desktop client for macOS + Windows and publishes the
# installers to a GitHub Release.
#
# Trigger:
#   - push a tag like  v0.1.0   -> builds + creates Release "v0.1.0"
#   - manual run (workflow_dispatch) -> builds, uploads artifacts only
#
# Notes:
#   - @talon-ui/* are `link:` deps locally; CI rewrites them to the published
#     npm versions (@talon-ui/react@^0.5.1, @talon-ui/tokens@^0.1.2).
#   - pnpm install uses --no-frozen-lockfile because the lockfile encodes the
#     local link: paths.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            label: macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: "Rewrite talon-ui link: deps to published npm versions"
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const p = "package.json";
            const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
            const pin = { "@talon-ui/react": "^0.5.1", "@talon-ui/tokens": "^0.1.2" };
            for (const dep of Object.keys(pin)) {
              if (pkg.dependencies && pkg.dependencies[dep]) {
                pkg.dependencies[dep] = pin[dep];
              }
            }
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
            console.log("patched talon-ui deps:", pin);
          '

      - name: Install frontend deps
        run: pnpm install --no-frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Compile-time master key for `ak-` access-token decryption
          # (option_env!("DATA_ACCESS_KEY") in src-tauri/src/app.rs). MUST be
          # set as a repo secret (64 hex, `openssl rand -hex 32`) and MUST match
          # the server's H5ST_ACCESS_KEY. Without it the build falls back to an
          # insecure all-0x07 dev placeholder key.
          DATA_ACCESS_KEY: ${{ secrets.DATA_ACCESS_KEY }}
        with:
          args: --target ${{ matrix.target }}
          # When run on a tag push, tauri-action creates/updates the GitHub
          # Release and uploads the installers. On workflow_dispatch (no tag)
          # it just builds; we grab the bundles via upload-artifact below.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseDraft: false
          releasePrerelease: false

      - name: Upload installers as workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis.zip
          if-no-files-found: warn
