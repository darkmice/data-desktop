name: build-server

# 在【公开仓 data-desktop】里编译【私有仓 data-service】的服务端,目的是省额度:
# 公开仓的 Actions 分钟数免费且无限,私有仓的分钟数会吃账户免费额度。本 workflow
# 用 secret PRIVATE_REPO_TOKEN(fine-grained 只读 data-service)把私有源码 checkout
# 过来,在免费的公开 runner 上原生编译。
#
# ⚠️ 产物里编进了写死的 master key(BUILTIN_ACCESS_KEY),所以【绝不发公开 Release】,
# 只存为 workflow artifact(私有,仅仓库可访问者能下)。去 Actions 页面或
# `gh run download` 取二进制。
#
# 关键顺序:服务端 src/admin_ui.rs 用 include_str! 嵌入 admin-ui/dist/assets/app.js
# 等,所以必须【先 build admin-ui】再 cargo build,否则 include_str! 路径不存在 →
# 编译失败。admin-ui 用 @talon-ui/* 的 link: 本地依赖,CI 改写成已发布 npm 版本。
#
# 产物只是 .exe / 二进制;运行时仍需 Chrome + 启动密码 H5ST_BOOT_PASSWORD,详见 server 仓。

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "私有仓 data-service 的分支/标签(默认 main)"
        required: false
        default: "main"

# 只读权限即可:产物用 artifact(私有,仅仓库可访问),不发 Release。
permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: h5st-server.exe
            asset: h5st-server-windows-x64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: h5st-server
            asset: h5st-server-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: h5st-server
            asset: h5st-server-macos-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout private server repo (data-service)
        uses: actions/checkout@v4
        with:
          repository: darkmice/data-service
          ref: ${{ github.event.inputs.ref || 'main' }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: admin-ui/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # ---- admin-ui (必须先于 cargo build) ----
      - name: "Rewrite talon-ui link: deps to published npm versions"
        shell: bash
        working-directory: admin-ui
        run: |
          node -e '
            const fs = require("fs");
            const p = "package.json";
            const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
            const pin = { "@talon-ui/react": "^0.5.1", "@talon-ui/tokens": "^0.1.2" };
            for (const dep of Object.keys(pin)) {
              if (pkg.dependencies && pkg.dependencies[dep]) {
                pkg.dependencies[dep] = pin[dep];
              }
            }
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
            console.log("patched talon-ui deps:", pin);
          '

      - name: Install admin-ui deps
        working-directory: admin-ui
        run: pnpm install --no-frozen-lockfile

      - name: Build admin-ui (produces dist/assets/app.js + app.css)
        working-directory: admin-ui
        run: pnpm build

      - name: Verify embedded assets exist
        shell: bash
        run: |
          test -f admin-ui/dist/assets/app.js   || { echo "missing app.js"; exit 1; }
          test -f admin-ui/dist/assets/app.css  || { echo "missing app.css"; exit 1; }
          test -f admin-ui/dist/index.html      || { echo "missing index.html"; exit 1; }
          echo "admin-ui assets OK"

      # ---- cargo build (嵌入 admin-ui 产物) ----
      - name: Build server (release)
        run: cargo build --release --target ${{ matrix.target }} --bin h5st-server

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p artifacts
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "artifacts/${{ matrix.asset }}"

      # 产物里编进了写死的 master key,绝不能发公开 Release。用 workflow artifact:
      # 默认私有,只有仓库可访问者能从 Actions 页面下载;90 天后自动过期。
      # 需要二进制时:gh run download <run-id> --repo darkmice/data-desktop -n <asset>
      - name: Upload server binary as workflow artifact (private to repo)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: artifacts/${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 14
